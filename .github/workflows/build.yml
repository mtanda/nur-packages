name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.system }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: macos-latest
            system: aarch64-darwin
    permissions:
      contents: read # checkout repository
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
      - uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: mtanda
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Show nixpkgs version
        run: nix eval --raw 'nixpkgs#lib.version'
      - name: Build all packages
        env:
          NIX_SYSTEM: ${{ matrix.system }}
        run: |
          for pkg in $(nix flake show --json | jq -r ".packages.\"${NIX_SYSTEM}\" | keys[]"); do
            # Check if package supports this platform
            platforms=$(nix eval --json ".#$pkg.meta.platforms" 2>/dev/null || echo '[]')
            if echo "$platforms" | jq -e "index(\"${NIX_SYSTEM}\")" > /dev/null 2>&1; then
              echo "::group::Building $pkg"
              nix build ".#$pkg" --print-build-logs
              echo "::endgroup::"
            else
              echo "::notice::Skipping $pkg (not supported on ${NIX_SYSTEM})"
            fi
          done
